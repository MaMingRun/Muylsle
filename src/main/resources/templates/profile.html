<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - MUYLSLE STUDY ONLINE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(0, 0, 0, 0.1);
            --accent-color: #4a90d9;
            --hover-color: #357abd;
        }

        body.dark {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: rgba(30, 30, 30, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body.custom-bg { background-size: cover; background-position: center; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease;
        }

        #bg-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.custom-bg #bg-overlay, body.dark #bg-overlay { opacity: 0.5; }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 40px;
            width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile-title {
            font-size: 24px;
            font-weight: 700;
        }

        .back-link {
            color: var(--accent-color);
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .avatar-display {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid var(--card-border);
        }

        .avatar-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-display svg {
            width: 60px;
            height: 60px;
            opacity: 0.4;
        }

        .upload-btn {
            padding: 6px 16px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-color);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        #avatar-input { display: none; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-color);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--accent-color);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover { background: var(--hover-color); }

        .btn-secondary {
            padding: 12px 20px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-color);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover { background: rgba(0, 0, 0, 0.05); }

        .btn-logout {
            padding: 12px 20px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 10px;
            background: transparent;
            color: #ff6b6b;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-logout:hover { background: rgba(255, 107, 107, 0.1); }

        .message {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            min-height: 18px;
        }

        .message.error { color: #ff6b6b; }
        .message.success { color: #51cf66; }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>

    <div class="profile-card">
        <div class="profile-header">
            <h1 class="profile-title">个人主页</h1>
            <a class="back-link" href="/">← 返回首页</a>
        </div>

        <div class="avatar-section">
            <div class="avatar-display" id="avatar-display">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                </svg>
            </div>
            <button class="upload-btn" id="upload-btn">更换头像</button>
            <input type="file" id="avatar-input" accept="image/*">
        </div>

        <form id="profile-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" disabled>
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="nickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>个人简介</label>
                <textarea id="bio" placeholder="介绍一下自己吧..."></textarea>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn-primary">保存修改</button>
                <button type="button" class="btn-logout" id="logout-btn">退出登录</button>
            </div>
            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user) {
            window.location.href = '/login';
        }

        const avatarDisplay = document.getElementById('avatar-display');
        const avatarInput = document.getElementById('avatar-input');
        const uploadBtn = document.getElementById('upload-btn');
        const usernameInput = document.getElementById('username');
        const nicknameInput = document.getElementById('nickname');
        const bioInput = document.getElementById('bio');
        const messageEl = document.getElementById('message');
        const logoutBtn = document.getElementById('logout-btn');
        const form = document.getElementById('profile-form');

        let currentAvatar = user.avatar || '';

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function renderAvatar() {
            if (currentAvatar) {
                avatarDisplay.innerHTML = `<img src="${currentAvatar}" alt="avatar">`;
            } else {
                avatarDisplay.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                </svg>`;
            }
        }

        function loadUserInfo() {
            usernameInput.value = user.username;
            nicknameInput.value = user.nickname || '';
            bioInput.value = user.bio || '';
            currentAvatar = user.avatar || '';
            renderAvatar();
        }

        loadUserInfo();

        uploadBtn.addEventListener('click', () => avatarInput.click());

        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                currentAvatar = event.target.result;
                renderAvatar();
            };
            reader.readAsDataURL(file);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                nickname: nicknameInput.value.trim(),
                bio: bioInput.value,
                avatar: currentAvatar
            };

            try {
                const res = await fetch(`/api/user/${user.id}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage('保存成功', 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                showMessage('保存失败: ' + err.message, 'error');
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('user');
            window.location.href = '/login';
        });
    </script>
</body>
</html>
