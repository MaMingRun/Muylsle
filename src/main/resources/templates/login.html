<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MUYLSLE STUDY ONLINE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(0, 0, 0, 0.1);
            --accent-color: #4a90d9;
            --hover-color: #357abd;
        }

        body.dark {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: rgba(30, 30, 30, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body.custom-bg {
            background-size: cover;
            background-position: center;
        }

        body.custom-light-text {
            --text-color: #ffffff;
            --card-bg: rgba(30, 30, 30, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body.custom-dark-text {
            --text-color: #333333;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        #bg-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.custom-bg #bg-overlay, body.dark #bg-overlay { opacity: 0.5; }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-color);
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(0, 0, 0, 0.08);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--accent-color);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--hover-color);
            transform: translateY(-2px);
        }

        .switch-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }

        .switch-text a {
            color: var(--accent-color);
            cursor: pointer;
            text-decoration: none;
        }

        .switch-text a:hover { text-decoration: underline; }

        .message {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            min-height: 18px;
        }

        .message.error { color: #ff6b6b; }
        .message.success { color: #51cf66; }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>

    <div class="auth-card">
        <h1 class="auth-title" id="auth-title">登录</h1>

        <form id="auth-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group" id="nickname-group" style="display:none">
                <label>昵称</label>
                <input type="text" id="nickname" placeholder="请输入昵称（可选）">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">登录</button>
            <div class="message" id="message"></div>
        </form>

        <div class="switch-text">
            <span id="switch-text">还没有账号？</span><a id="switch-link">立即注册</a>
        </div>
    </div>

    <script>
        function calculateBrightness(image) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100;
            canvas.height = 100;
            ctx.drawImage(image, 0, 0, 100, 100);
            const imageData = ctx.getImageData(0, 0, 100, 100);
            const data = imageData.data;
            let brightness = 0;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                brightness += (0.299 * r + 0.587 * g + 0.114 * b);
            }
            return brightness / (data.length / 4);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const savedBg = localStorage.getItem('customBg');
            
            if (savedTheme === 'custom' && savedBg) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const brightness = calculateBrightness(img);
                    document.body.style.backgroundImage = `url(${savedBg})`;
                    document.body.classList.add('custom-bg');
                    if (brightness > 128) {
                        document.body.classList.add('custom-dark-text');
                    } else {
                        document.body.classList.add('custom-light-text');
                    }
                };
                img.onerror = () => {
                    document.body.style.backgroundImage = `url(${savedBg})`;
                    document.body.classList.add('custom-bg', 'custom-dark-text');
                };
                img.src = savedBg;
            } else if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            }
        }

        initTheme();

        let mode = 'login';

        const authTitle = document.getElementById('auth-title');
        const submitBtn = document.getElementById('submit-btn');
        const switchText = document.getElementById('switch-text');
        const switchLink = document.getElementById('switch-link');
        const nicknameGroup = document.getElementById('nickname-group');
        const messageEl = document.getElementById('message');
        const form = document.getElementById('auth-form');

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
        }

        function switchMode() {
            mode = mode === 'login' ? 'register' : 'login';
            if (mode === 'login') {
                authTitle.textContent = '登录';
                submitBtn.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
                nicknameGroup.style.display = 'none';
            } else {
                authTitle.textContent = '注册';
                submitBtn.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '返回登录';
                nicknameGroup.style.display = 'block';
            }
            showMessage('', '');
        }

        switchLink.addEventListener('click', switchMode);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const nickname = document.getElementById('nickname').value.trim();

            if (!username || !password) {
                showMessage('用户名和密码不能为空', 'error');
                return;
            }

            const url = mode === 'login' ? '/api/login' : '/api/register';
            const body = mode === 'login'
                ? { username, password }
                : { username, password, nickname };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    if (mode === 'register') {
                        showMessage('注册成功！请登录', 'success');
                        setTimeout(switchMode, 1000);
                    } else {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/profile';
                    }
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                showMessage('请求失败: ' + err.message, 'error');
            }
        });
    </script>
</body>
</html>
