services:
  - type: web
    name: self-study
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/self-study-1.0.0.jar --spring.profiles.active=prod
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: self-study-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: self-study-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: self-study-db
          property: password

  - type: pserv
    name: self-study-db
    runtime: postgres
    plan: free